<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI CLI 速查表</title>
<style>
  :root{
    --bg: #0d1117;
    --panel: #11161d;
    --panel-2: #161c25;
    --line: #232b36;
    --text: #d8dee9;
    --text-dim: #7e8a9a;
    --mono: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
    --accent: #e8b339;
  }
  @media (prefers-color-scheme: light) {
    :root{
      --bg: #f6f8fa;
      --panel: #ffffff;
      --panel-2: #f0f2f5;
      --line: #d0d7de;
      --text: #1f2328;
      --text-dim: #636c76;
      --accent: #bf8700;
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,'PingFang SC','Microsoft Yahei',Segoe UI,sans-serif;
    width:460px; max-height:600px; overflow:hidden;
  }
  .topbar{padding:12px 14px 10px; border-bottom:1px solid var(--line);}
  .title-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
  .title-row h1{font-size:14px;font-weight:600;margin:0;}
  .title-row .sub{font-size:10.5px;color:var(--text-dim);font-family:var(--mono);}

  .update-panel{
    display:flex; flex-direction:column; gap:6px;
    padding:8px; background:var(--panel-2); border:1px solid var(--line); border-radius:8px;
  }
  .update-row{display:flex; gap:6px; align-items:center;}
  .mode-toggle{display:flex; gap:4px; flex-shrink:0;}
  .mode-btn{
    font-size:10.5px; padding:5px 9px; border-radius:6px; cursor:pointer;
    border:1px solid var(--line); background:var(--panel); color:var(--text-dim); font-family:var(--mono);
  }
  .mode-btn.active{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600;}
  #updateTool{
    flex:1; min-width:0; background:var(--panel); border:1px solid var(--line); border-radius:6px;
    color:var(--text); font-size:12px; padding:6px 8px; outline:none;
  }
  #updateTool:focus{border-color:var(--accent);}
  #updateBtn{
    flex-shrink:0; background:var(--accent); border:none; border-radius:6px;
    color:#fff; font-size:12px; font-weight:600; padding:6px 12px; cursor:pointer;
  }
  #updateBtn:hover{opacity:0.9;}
  #updateBtn:disabled{opacity:0.5; cursor:not-allowed;}
  #updateHint{font-size:10px; color:var(--text-dim); line-height:1.4;}
  #updateStatus{
    font-size:11px; padding:0 14px; line-height:1.5; white-space:pre-wrap;
    max-height:90px; overflow-y:auto; display:none;
  }
  #updateStatus.show{display:block; margin-bottom:8px;}
  #updateStatus.ok{color:#2da44e;}
  #updateStatus.err{color:#cf222e;}

  .search-wrap{position:relative;margin-bottom:8px;}
  #search{
    width:100%; padding:8px 10px 8px 30px;
    background:var(--panel-2); border:1px solid var(--line); border-radius:8px;
    color:var(--text); font-size:13px; outline:none;
  }
  #search:focus{border-color:var(--accent);}
  .search-icon{position:absolute; left:10px; top:50%; transform:translateY(-50%); width:13px; height:13px; opacity:0.5;}
  .search-icon svg{width:100%;height:100%;stroke:var(--text-dim);fill:none;stroke-width:2;}

  .filters{display:flex;gap:5px;flex-wrap:wrap;}
  .chip{
    padding:4px 9px; border-radius:999px; font-size:11px; cursor:pointer;
    border:1px solid var(--line); background:var(--panel); color:var(--text-dim);
    user-select:none; font-family:var(--mono); white-space:nowrap;
  }
  .chip.active{color:#fff; font-weight:600;}
  .chip[data-tool="all"].active{background:var(--accent); border-color:var(--accent);}
  .chip[data-tool="favourites"].active{background:#cf222e; border-color:#cf222e;}
  .chip[data-cat].active{background:#5a6573; border-color:#5a6573;}

  .count-bar{padding:6px 14px; font-size:10.5px; color:var(--text-dim); border-bottom:1px solid var(--line);}

  #main{height:440px; overflow-y:auto; padding:8px 12px 16px;}
  #main::-webkit-scrollbar{width:6px;}
  #main::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}

  .tool-block{margin-bottom:14px;}
  .tool-header{
    display:flex; align-items:center; gap:7px; padding:4px 2px; margin-bottom:4px;
  }
  .tool-header .badge{
    font-family:var(--mono); font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:5px; color:#fff;
  }
  .tool-header .cnt{font-size:10px; color:var(--text-dim);}

  .row{
    display:flex; flex-direction:column; gap:2px; position:relative;
    padding:7px 8px; border-radius:6px; margin-bottom:3px;
    border:1px solid transparent;
  }
  .row:hover{background:var(--panel); border-color:var(--line);}
  .row:focus{outline:1px solid var(--accent); outline-offset:-1px; background:var(--panel);}
  .row .cmd{font-family:var(--mono); font-size:12px; font-weight:600; color:var(--text); padding-right:52px;}
  .row .cmd .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .row .zh{font-size:12px; color:var(--text); line-height:1.4;}
  .row .en{font-size:10.5px; color:var(--text-dim);}

  .row-actions{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    display:none; gap:2px; align-items:center;
  }
  .row:hover .row-actions, .row:focus .row-actions{display:flex;}
  .act-btn{
    background:none; border:none; cursor:pointer; padding:4px 5px; border-radius:4px;
    color:var(--text-dim); display:flex; align-items:center; line-height:1;
  }
  .act-btn:hover{background:var(--line); color:var(--text);}
  .act-btn.copied{color:#2da44e;}
  .act-btn.fav-active{color:#cf222e;}

  .empty{text-align:center; padding:50px 16px; color:var(--text-dim); font-size:12px;}
  .footer-note{padding:8px 14px; font-size:10px; color:var(--text-dim); border-top:1px solid var(--line); line-height:1.5;}
</style>
</head>
<body>

<div class="topbar">
  <div class="title-row">
    <h1>🗂 AI CLI 速查表</h1>
    <span class="sub">Claude Code · Codex · Gemini · Antigravity · OpenCode</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input id="search" type="text" placeholder="搜索命令、快捷键、中文意思…" autocomplete="off">
  </div>
  <div class="update-panel">
    <div class="mode-toggle">
      <div class="mode-btn active" data-mode="add">➕ 新增工具</div>
      <div class="mode-btn" data-mode="update">🔄 更新已有</div>
      <div class="mode-btn" data-mode="remove">🗑️ 移除工具</div>
    </div>
    <div class="update-row">
      <input id="updateTool" type="text" placeholder="工具名，如 OpenCode / IntelliJ IDEA" autocomplete="off">
      <button id="updateBtn">查询并写入</button>
    </div>
    <div id="updateHint">新增模式：从零查询该工具并加入列表。更新模式：刷新已收录工具的最新内容。</div>
  </div>
  <div id="updateStatus"></div>
  <div class="filters" id="filters"></div>
</div>

<div class="count-bar" id="countBar"></div>
<div id="main"></div>
<div class="footer-note">内容整理自官方文档，命令以本机 <code>/help</code> 输出为准。⚠️ Antigravity CLI 刚发布，命令仍在快速变化；Gemini CLI 免费层正被引导迁移至 Antigravity CLI，详情见官方公告。</div>

<script src="data/claude-code.js"></script>
<script src="data/codex.js"></script>
<script src="data/gemini-cli.js"></script>
<script src="data/antigravity-cli.js"></script>
<script src="data/opencode.js"></script>
<script src="data/idea.js"></script>
<script src="data/vs-code.js"></script>
<script src="popup.js"></script>
</body>
</html>
