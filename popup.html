<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI CLI 速查表</title>
<style>
  :root{--bg:#0d1117;--panel:#11161d;--panel2:#161c25;--line:#28313d;--text:#d8dee9;--dim:#8995a5;--accent:#e8b339;--ok:#3fb950;--danger:#f85149;--mono:'SF Mono','JetBrains Mono',Consolas,monospace}
  @media(prefers-color-scheme:light){:root{--bg:#f6f8fa;--panel:#fff;--panel2:#f0f2f5;--line:#d0d7de;--text:#1f2328;--dim:#636c76;--accent:#8a6500;--ok:#1a7f37;--danger:#cf222e}}
  *{box-sizing:border-box}html,body{margin:0;width:460px;height:600px;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Microsoft Yahei',Segoe UI,sans-serif}body{display:flex;flex-direction:column}
  button,input,select{font:inherit}.view{display:none;flex:1;min-height:0;flex-direction:column}.view.active{display:flex}
  .header{padding:11px 13px 9px;border-bottom:1px solid var(--line);background:var(--bg)}.title-row,.toolbar,.manage-title,.setting-row,.tool-title,.diff-actions{display:flex;align-items:center}.title-row{justify-content:space-between;margin-bottom:8px}.brand{font-size:14px;font-weight:650}.icon-btn,.text-btn{border:1px solid var(--line);background:var(--panel);color:var(--dim);border-radius:6px;cursor:pointer}.icon-btn{padding:5px 8px}.text-btn{padding:6px 10px}.text-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}.text-btn.danger{color:var(--danger)}.text-btn:disabled{opacity:.5;cursor:not-allowed}
  .search-wrap{position:relative}.search-wrap input{width:100%;padding:9px 31px 9px 30px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);outline:none}.search-wrap input:focus{border-color:var(--accent)}.search-icon{position:absolute;left:10px;top:9px;color:var(--dim)}#clearSearch{position:absolute;right:6px;top:5px;border:0;background:none;color:var(--dim);cursor:pointer;font-size:17px}
  .toolbar{gap:6px;padding-top:8px;flex-wrap:wrap}.chip{white-space:nowrap;padding:4px 9px;border:1px solid var(--line);border-radius:999px;background:var(--panel);color:var(--dim);font:11px var(--mono);cursor:pointer}.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:650}.filters{padding-top:6px;display:flex;gap:5px;flex-wrap:wrap}.filter-clear{margin-left:auto}.shell-filters{padding-top:5px}.shell-filters:empty{display:none}.shell-filters .chip{font-size:10px;padding:3px 7px}
  .count-bar{padding:6px 13px;border-bottom:1px solid var(--line);font-size:10.5px;color:var(--dim)}#main{flex:1;min-height:0;overflow:auto;padding:8px 11px 15px}.section-title{display:flex;align-items:center;gap:7px;padding:4px 2px;margin:3px 0}.badge{font:700 10.5px var(--mono);padding:2px 7px;border-radius:5px;color:#fff}.count{font-size:10px;color:var(--dim)}.source-toggle{margin-left:auto;border:0;background:none;color:var(--dim);cursor:pointer;font-size:10px}
  .entry-wrap{position:relative;margin-bottom:4px;border:1px solid transparent;border-radius:7px}.entry-wrap:hover,.entry-wrap:focus-within{background:var(--panel);border-color:var(--line)}.row{display:flex;align-items:flex-start}.row-main{flex:1;min-width:0;padding:7px 80px 7px 8px;border:0;background:transparent;color:inherit;text-align:left;cursor:copy}.row-main:focus{outline:2px solid var(--accent);outline-offset:-2px;border-radius:7px}.row-main:disabled{cursor:not-allowed;opacity:.65}.cmd,.zh,.en,.match-reason,.example-summary{display:block}.cmd{font:650 12px var(--mono)}.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px}.context,.platform-note,.trust-tag{display:inline-block;margin-left:6px;font:9px sans-serif;color:var(--dim)}.trust-tag{padding:1px 5px;border-radius:999px;background:var(--panel2)}.trust-tag.risk{color:var(--danger)}.trust-tag.stale{color:var(--accent)}.trust-tag.tier{color:var(--accent);border:1px solid var(--accent)}.trust-tag.evidence-verified{color:#2e9d63;border-color:#2e9d63}.trust-tag.evidence-partial{color:var(--accent)}.trust-tag.evidence-unverified{color:var(--danger);border-color:var(--danger)}.zh{font-size:12px;line-height:1.4;margin-top:2px}.en{font-size:10.5px;color:var(--dim)}.match-reason,.example-summary{margin-top:3px;font-size:9.5px;color:var(--accent)}.example-summary{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.relaxed-note{color:var(--accent);font-weight:600}mark{background:rgba(232,179,57,.28);color:inherit;border-radius:2px}.row-actions{position:absolute;right:5px;top:6px;display:flex;gap:1px}.act{border:0;background:none;color:var(--dim);padding:5px;cursor:pointer}.act:hover{color:var(--text)}.copy-btn{font-size:10px;border:1px solid var(--line);border-radius:999px;padding:3px 7px;background:var(--panel2);color:var(--text)}.copy-btn:disabled{opacity:.45;cursor:not-allowed}.fav-btn{font-size:15px}.fav-active{color:var(--danger)}.usage-toggle{margin:0 8px 6px;padding:2px 8px;border:1px solid var(--line);border-radius:999px;background:transparent;color:var(--dim);font-size:9.5px;cursor:pointer}.examples{margin:0 8px 7px;padding:7px;border-left:2px solid var(--accent);background:var(--panel);border-radius:0 6px 6px 0}.command-evidence{padding:6px 0 0;font-size:9px;color:var(--dim);line-height:1.45;border-top:1px solid var(--line)}.command-evidence a{color:var(--accent)}.example{position:relative;padding:7px 46px 7px 0;border-top:1px solid var(--line)}.example:first-child{border-top:0}.example-value{font:10.5px var(--mono);white-space:pre-wrap;word-break:break-word}.example-desc{margin-top:2px;font-size:10px;color:var(--dim)}.example-context{margin-top:2px;font-size:9.5px;color:var(--dim);line-height:1.35}.example-source{display:inline-block;margin-top:3px;padding:1px 5px;border-radius:4px;background:var(--panel2);color:var(--dim);font-size:8.5px}.example-doc{color:var(--accent);text-decoration:none}.example-doc:hover{text-decoration:underline}.example-warning{margin-top:3px;font-size:9.5px;color:var(--danger)}.example-copy{position:absolute;right:0;top:7px}.example-badge{display:inline-block;margin-bottom:4px;padding:1px 5px;border-radius:4px;background:var(--accent);color:#fff;font-size:8.5px;font-weight:650}.placeholder{padding:0 2px;border:1px dashed var(--accent);border-radius:3px;color:var(--accent)}.empty{padding:55px 20px;text-align:center;color:var(--dim);font-size:12px}.more-btn{display:block;margin:8px auto 12px}
  .source-card{display:none;margin:0 2px 7px;padding:8px;border:1px solid var(--line);border-radius:6px;background:var(--panel2);font-size:10.5px;color:var(--dim);line-height:1.5}.source-card.show{display:block}.source-card a{color:var(--accent)}.source-list{margin-top:5px}.source-entry{padding:4px 0;border-top:1px solid var(--line)}.source-entry:first-child{border-top:0}.source-list summary{cursor:pointer;color:var(--accent);padding:4px 0}
	  .manage-header{padding:11px 13px;border-bottom:1px solid var(--line)}.manage-title{gap:8px;font-weight:650}.manage-body{flex:1;overflow:auto;padding:10px 12px 20px}.panel{padding:10px;margin-bottom:10px;border:1px solid var(--line);border-radius:8px;background:var(--panel)}.panel h2{font-size:12px;margin:0 0 8px}.setting-row{justify-content:space-between;gap:8px;font-size:11px}.setting-row select,.add-row input,.tool-select,.recommend-controls input{min-width:0;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:var(--panel2);color:var(--text)}.tool-card{padding:9px 0;border-top:1px solid var(--line)}.tool-card:first-of-type{border-top:0}.tool-title{gap:7px}.tool-title label{font-size:12px;font-weight:600}.tool-actions{display:flex;gap:5px;margin-top:7px}.recommend-controls{display:flex;align-items:center;gap:8px;margin-bottom:7px}.recommend-controls input[type="search"]{flex:1}.recommend-controls label{display:flex;align-items:center;gap:4px;color:var(--dim);font-size:10px;white-space:nowrap}.recommend-grid{display:grid;grid-template-columns:1fr;gap:7px;margin-bottom:12px}.recommend-group-title{font-size:10px;font-weight:650;color:var(--dim);margin:8px 0 5px}.recommend-group-title span{font-weight:400}.recommend-card{padding:8px;border:1px solid var(--line);border-radius:7px;background:var(--panel2)}.recommend-card.is-dismissed{opacity:.7}.recommend-head{display:flex;align-items:center;justify-content:space-between;gap:8px}.recommend-name{font-size:12px;font-weight:650}.recommend-cat{font-size:9.5px;color:var(--accent)}.recommend-actions{display:flex;gap:5px;align-items:center}.recommend-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}.recommend-tags span{padding:1px 5px;border-radius:999px;background:var(--panel);color:var(--dim);font-size:8.5px}.recommend-tags .recommend-web-hint{color:var(--accent);background:transparent;border:1px solid var(--accent)}.recommend-related{margin-top:5px;font-size:9.5px;color:var(--accent)}.recommend-card.is-adding{opacity:.6}.recommend-actions a.text-btn{text-decoration:none;display:inline-block}.toast-undo{margin-left:8px;border:0;background:none;color:var(--accent);font:inherit;font-weight:650;cursor:pointer}.advanced-actions,.maintenance-panel{margin-top:7px;font-size:10px;color:var(--dim)}.advanced-actions summary,.maintenance-panel summary{cursor:pointer;color:var(--dim)}.maintenance-panel>summary{font-size:12px;font-weight:650;color:var(--text);padding:2px 0 8px}.stats-detail{margin-top:5px}.stats-detail summary{cursor:pointer;color:var(--dim);font-size:10px;padding:2px 0}.meta{font-size:10px;color:var(--dim);line-height:1.45;margin-top:5px}.meta a{color:var(--accent)}.add-row{display:flex;gap:6px}.add-row input{flex:1}.status{display:none;padding:8px;margin:8px 0;border-radius:6px;background:var(--panel2);white-space:pre-wrap;font-size:11px;line-height:1.45}.status.show{display:block}.status.ok{color:var(--ok)}.status.warn{color:var(--accent)}.status.err{color:var(--danger)}
  .diff-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:8px 0}.diff-stat{padding:7px 3px;text-align:center;border-radius:6px;background:var(--panel2);font-size:10px}.diff-stat strong{display:block;font-size:15px}.diff-list{max-height:150px;overflow:auto;font-size:10.5px;color:var(--dim)}.diff-list div{padding:3px 0}.diff-actions{gap:6px;margin-top:8px}.warning,.quality-warning{display:block;padding:8px;margin-top:8px;border:1px solid var(--danger);border-radius:6px;color:var(--danger);font-size:10.5px;line-height:1.45}.quality-warning{border-color:var(--accent);color:var(--accent)}.verify{display:inline-block;padding:1px 5px;border-radius:4px;background:var(--panel2);font-size:9px}.toast{position:fixed;left:50%;bottom:18px;z-index:20;transform:translateX(-50%);padding:7px 12px;border-radius:7px;background:var(--text);color:var(--bg);font-size:11px;opacity:0;pointer-events:none;transition:opacity .15s}.toast.show{opacity:1}
  .onboarding,.risk-dialog{display:none;position:fixed;inset:0;z-index:10;background:rgba(0,0,0,.65);align-items:center;justify-content:center}.onboarding.show,.risk-dialog.show{display:flex}.onboard-card,.risk-card{width:410px;max-height:550px;overflow:auto;padding:16px;border:1px solid var(--line);border-radius:12px;background:var(--bg);box-shadow:0 12px 40px rgba(0,0,0,.35)}.onboard-card h1,.risk-card h2{font-size:17px;margin:0 0 5px}.onboard-card p,.risk-card p{font-size:11px;color:var(--dim);line-height:1.5}.risk-command{margin:8px 0;padding:8px;border-radius:6px;background:var(--panel2);font:10.5px var(--mono);white-space:pre-wrap;word-break:break-word}.risk-list{margin:8px 0;padding-left:18px;color:var(--danger);font-size:11px;line-height:1.45}.risk-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:12px}.preset-row{display:flex;gap:5px;flex-wrap:wrap;margin:9px 0}.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0}.tool-choice{padding:8px;border:1px solid var(--line);border-radius:7px;background:var(--panel);font-size:11px}.onboard-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:12px}
  /* 焦点可见性与可访问性 */
  .chip:focus-visible,.act:focus-visible,.text-btn:focus-visible,.icon-btn:focus-visible,.usage-toggle:focus-visible,.source-toggle:focus-visible,.example-copy:focus-visible,#clearSearch:focus-visible,select:focus-visible,summary:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:6px}
  .loading{animation:pulse 1.1s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<section id="homeView" class="view active">
  <div class="header">
    <div class="title-row"><div class="brand">🗂 AI CLI 速查表</div><button id="openManage" class="icon-btn" title="管理工具和数据">⚙ 管理</button></div>
    <div class="search-wrap"><span class="search-icon">⌕</span><input id="search" aria-label="搜索命令" placeholder="搜索命令、中文用途或英文说明…" autocomplete="off"><button id="clearSearch" title="清空搜索" aria-label="清空搜索">×</button></div>
    <div id="quickFilters" class="toolbar"></div>
    <div id="categoryFilters" class="filters"></div>
    <div id="shellFilters" class="filters shell-filters" aria-label="Shell 维度筛选"></div>
  </div>
  <div id="countBar" class="count-bar"></div>
  <div id="main"></div>
</section>

<section id="manageView" class="view">
  <div class="manage-header"><div class="manage-title"><button id="closeManage" class="icon-btn">← 返回</button><span>管理工具与数据</span></div></div>
  <div class="manage-body">
    <div class="panel">
      <h2>偏好设置</h2>
      <div class="setting-row"><span>当前平台</span><select id="platformSelect"><option value="mac">macOS</option><option value="windows">Windows</option><option value="linux">Linux</option></select></div>
      <div id="manageToolToggles" class="tool-grid"></div>
      <div class="tool-actions"><button id="rerunOnboarding" class="text-btn">重新选择常用工具</button><button id="clearRecent" class="text-btn">清空最近使用</button></div>
    </div>
    <div class="panel">
      <h2>推荐添加</h2>
      <div class="recommend-controls">
        <input id="recommendSearch" type="search" placeholder="搜索推荐工具、类别或标签…" autocomplete="off">
        <label><input type="checkbox" id="showDismissedRecommendations">显示已忽略</label>
      </div>
      <div id="recommendCategories" class="filters"></div>
      <div id="recommendedTools" class="recommend-grid"></div>
    </div>
    <div class="panel">
      <details class="maintenance-panel">
        <summary>数据维护与高级操作</summary>
        <div class="setting-row"><label for="webVerifyToggle">新增工具时联网核对（更准但更慢）</label><input type="checkbox" id="webVerifyToggle"></div>
        <h2>工具与来源</h2>
        <div id="manageTools"></div>
        <h2>新增工具</h2>
        <div class="add-row"><input id="addToolName" placeholder="如 Warp / Cursor"><button id="addToolBtn" class="text-btn primary">查询并新增</button></div>
        <div class="meta">需要已安装本地桥接和 Claude Code，会计入正常 Claude 用量。</div>
      </details>
    </div>
    <div id="manageStatus" class="status"></div>
    <div id="pendingPanel" class="panel" hidden></div>
  </div>
</section>

<div id="onboarding" class="onboarding" role="dialog" aria-modal="true" aria-labelledby="onboardTitle">
  <div class="onboard-card" role="document" tabindex="-1">
    <h1 id="onboardTitle">先选择你常用的工具</h1>
    <p>之后首页只展示这些工具。你可以跳过并保留全部，也可以随时在管理页修改。</p>
    <div class="setting-row"><span>使用平台</span><select id="onboardPlatform"><option value="mac">macOS</option><option value="windows">Windows</option><option value="linux">Linux</option></select></div>
    <div class="preset-row" aria-label="常用工具预设"><button class="chip" data-preset="ai">AI CLI</button><button class="chip" data-preset="editors">编辑器</button><button class="chip" data-preset="terminal">Git / Linux / Shell</button><button class="chip" data-preset="all">全部</button></div>
    <div id="onboardTools" class="tool-grid"></div>
    <div class="onboard-actions"><button id="skipOnboarding" class="text-btn">跳过，显示全部</button><button id="saveOnboarding" class="text-btn primary">保存偏好</button></div>
  </div>
</div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<div id="riskDialog" class="risk-dialog" role="dialog" aria-modal="true" aria-labelledby="riskTitle">
  <div class="risk-card" role="document" tabindex="-1">
    <h2 id="riskTitle">复制前确认高风险命令</h2>
    <p id="riskSummary"></p>
    <div id="riskCommand" class="risk-command"></div>
    <ul id="riskDetails" class="risk-list"></ul>
    <div class="risk-actions"><button id="riskCancel" class="text-btn">取消</button><button id="riskConfirm" class="text-btn primary">确认复制</button></div>
  </div>
</div>

<script src="data/index.js"></script>
<script src="product-core.js"></script>
<script src="enrichments/antigravity-cli.js"></script>
<script src="enrichments/claude-code.js"></script>
<script src="enrichments/codex.js"></script>
<script src="enrichments/gemini-cli.js"></script>
<script src="enrichments/openclaw.js"></script>
<script src="enrichments/opencode.js"></script>
<script src="enrichments/z-migrated-curated.js"></script>
<script src="usage-examples.js"></script>
<script src="popup-state.js"></script>
<script src="popup-render.js"></script>
<script src="popup-tasks.js"></script>
<script src="popup.js"></script>
</body>
</html>
